<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirat-un-Nisa🦋 - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">Sirat-un-Nisa🦋</a>
        <button class="menu-toggle" aria-label="Toggle navigation">&#9776;</button>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section id="contact" class="contact" style="min-height: 80vh; padding-top: 100px;">
            <h2>Contact Me</h2>
            <p class="section-subtitle">I'm always open to new opportunities and discussions!</p>

            <form id="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Your message here..."></textarea>
                </div>
                <button type="submit" class="btn submit-btn">Send Message</button>
                <p id="form-message" class="hidden"></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-text">
            <p>&copy; 2025 Sirat-un-Nisa🦋. All Rights Reserved. | Designed for Web Technologies.</p>
        </div>
        <div class="footer-icon-top">
            <a href="#contact">&#x2191;</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
